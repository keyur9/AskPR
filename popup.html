<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AskPR</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <header>
      <span class="logo">⬡ AskPR</span>
      <div class="header-right">
        <span id="provider-badge"></span>
        <button id="btn-settings" title="Settings">⚙</button>
      </div>
    </header>

    <!-- Settings panel -->
    <section id="settings-panel" class="hidden">
      <div class="settings-group">
        <label>AI Provider</label>
        <div class="provider-tabs">
          <button class="provider-tab active" data-provider="anthropic">Anthropic</button>
          <button class="provider-tab" data-provider="openai">OpenAI</button>
        </div>
      </div>

      <div id="settings-anthropic" class="provider-settings">
        <label for="anthropic-key">API Key</label>
        <input type="password" id="anthropic-key" placeholder="sk-ant-..." autocomplete="off" />
        <div class="settings-row">
          <label for="anthropic-model">Model</label>
          <select id="anthropic-model">
            <option value="claude-sonnet-4-6">claude-sonnet-4-6 (recommended)</option>
            <option value="claude-opus-4-6">claude-opus-4-6 (smarter, slower)</option>
            <option value="claude-haiku-4-5-20251001">claude-haiku-4-5 (fastest)</option>
          </select>
        </div>
        <p class="hint">Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
      </div>

      <div id="settings-openai" class="provider-settings hidden">
        <label for="openai-key">API Key</label>
        <input type="password" id="openai-key" placeholder="sk-..." autocomplete="off" />
        <div class="settings-row">
          <label for="openai-model">Model</label>
          <select id="openai-model">
            <option value="gpt-4o">gpt-4o (recommended)</option>
            <option value="gpt-4o-mini">gpt-4o-mini (faster, cheaper)</option>
            <option value="o3-mini">o3-mini (reasoning)</option>
          </select>
        </div>
        <p class="hint">Get a key at <a href="https://platform.openai.com" target="_blank">platform.openai.com</a></p>
      </div>

      <button id="btn-save-settings">Save Settings</button>
    </section>

    <!-- Not a PR page -->
    <section id="not-pr-page" class="hidden">
      <p>Open a GitHub Pull Request to use AskPR.</p>
      <p class="hint">e.g. github.com/owner/repo/pull/123</p>
    </section>

    <!-- Main panel -->
    <section id="main-panel" class="hidden">

      <div id="context-bar">
        <span id="pr-label">Loading PR…</span>
        <div class="context-actions">
          <button id="btn-clear" title="Clear conversation">🗑</button>
          <button id="btn-reload-context" title="Re-fetch PR">↺</button>
        </div>
      </div>

      <details id="context-details">
        <summary>Extracted context</summary>
        <pre id="context-preview"></pre>
      </details>

      <!-- Mode toggle -->
      <div id="mode-bar">
        <button class="mode-btn active" data-mode="voice">🎤 Voice</button>
        <button class="mode-btn" data-mode="text">💬 Text</button>
      </div>

      <!-- Chat log (shared) -->
      <div id="chat-log"></div>

      <!-- Voice mode controls -->
      <div id="voice-controls">
        <div id="voice-status">Ready</div>
        <button id="btn-ptt">Hold to Speak</button>
        <div id="transcript-preview"></div>
      </div>

      <!-- Text mode controls -->
      <div id="text-controls" class="hidden">
        <div id="suggestions">
          <button class="suggestion">Why was this approach chosen?</button>
          <button class="suggestion">What are the risks here?</button>
          <button class="suggestion">What tests are missing?</button>
          <button class="suggestion">Summarize this PR in 60 seconds.</button>
        </div>
        <div id="input-row">
          <textarea id="question-input" placeholder="Ask the author anything…" rows="2"></textarea>
          <button id="btn-ask">Ask</button>
        </div>
      </div>

      <p id="status-msg" class="hint"></p>
    </section>

  </div>
  <script src="src/popup.js"></script>
</body>
</html>
